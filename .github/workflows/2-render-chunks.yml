name: "2 — Render Video Chunks"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["1 — Generate & Sync-Check Audio"]
    types: [completed]

jobs:
  setup:
    name: Prepare audio assets
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download audio artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          workflow: "1 — Generate & Sync-Check Audio"
          name: audio-assets
          path: public/audio/

  render:
    name: Render ${{ matrix.chunk.id }}
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        chunk:
          - { id: "chunk_01_hook",      compositionId: "chunk_01_hook" }
          - { id: "chunk_02_setup",     compositionId: "chunk_02_setup" }
          - { id: "chunk_03_mechanism", compositionId: "chunk_03_mechanism" }
          - { id: "chunk_04_proof",     compositionId: "chunk_04_proof" }
          - { id: "chunk_05_twist",     compositionId: "chunk_05_twist" }
          - { id: "chunk_06_outro",     compositionId: "chunk_06_outro" }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: remotion-bundle
          path: out/

      - name: Bundle project
        run: npx remotion bundle src/index.ts out/bundle.js --quiet
        if: steps.download-artifact.outcome != 'success' || !steps.download-artifact.outputs.downloadPath

      - name: Install Chrome for Remotion
        run: npx remotion browser ensure

      - name: Render chunk
        run: |
          mkdir -p out
          npx remotion render \
            --composition=${{ matrix.chunk.compositionId }} \
            --output=out/${{ matrix.chunk.id }}.mp4 \
            --codec=h264 \
            --crf=18 \
            --jpeg-quality=95 \
            --concurrency=2
        env:
          REMOTION_ALLOW_EVAL: true

      - name: Upload chunk artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.chunk.id }}
          path: out/${{ matrix.chunk.id }}.mp4
          retention-days: 7
          if-no-files-found: error
