name: "0 — MASTER TRIGGER (Full Pipeline)"

on:
  workflow_dispatch:

jobs:
  # ══════════════════════════════════════════════════════════════
  # STAGE 0 — Code Review & Typecheck
  # ══════════════════════════════════════════════════════════════
  review:
    name: "Stage 0 — Code Review & Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck

  audio:
    name: "Stage 1 — Generate Audio"
    runs-on: ubuntu-latest
    needs: [review]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg espeak-ng
      - name: Install Python dependencies
        run: pip install kokoro-onnx soundfile pydub --quiet
      - name: Create output directory
        run: mkdir -p public/audio/
      - name: Generate TTS
        run: python scripts/generate_audio.py
      - name: Verify audio files created
        run: |
          echo "Audio files generated:"
          ls -lh public/audio/ || echo "No audio files found"
      - name: Upload Audio Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audio-assets
          path: public/audio/
          if-no-files-found: error

  bundle:
    name: "Stage 2a — Bundle Project"
    runs-on: ubuntu-latest
    needs: [review]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Create output directory
        run: mkdir -p out
      - name: Debug - Check TypeScript files
        run: |
          echo "Checking for src/index.ts..."
          ls -la src/ || echo "src/ directory not found"
          find . -name "*.ts" -o -name "*.tsx" | head -20
      - name: Bundle Project
        run: |
          npx remotion bundle src/index.ts out/bundle.js --quiet
      - name: Debug - Check bundle output
        run: |
          echo "Checking bundle output..."
          ls -lh out/ || echo "out/ directory is empty"
          if [ -f "out/bundle.js" ]; then
            echo "✓ Bundle created successfully"
            wc -l out/bundle.js
          else
            echo "✗ Bundle file not found"
            exit 1
          fi
      - name: Upload Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: remotion-bundle
          path: out/bundle.js
          if-no-files-found: error

  render_chunk_01:
    name: "Stage 2b — Render chunk_01_hook"
    runs-on: ubuntu-latest
    needs: [bundle, audio]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Create output directory
        run: mkdir -p out
      - name: Download Bundle
        uses: actions/download-artifact@v4
        with:
          name: remotion-bundle
          path: out/
      - name: Download Audio
        uses: actions/download-artifact@v4
        with:
          name: audio-assets
          path: public/audio/
      - name: Render chunk_01_hook
        run: |
          npx remotion render out/bundle.js "chunk_01_hook" "out/chunk_01_hook.mp4" \
            --props '{}' \
            --concurrency 2 \
            --quiet
      - name: Verify render output
        run: |
          if [ -f "out/chunk_01_hook.mp4" ]; then
            echo "✓ chunk_01_hook rendered"
            ls -lh "out/chunk_01_hook.mp4"
          else
            echo "✗ chunk_01_hook render failed"
            exit 1
          fi
      - name: Upload Chunk Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chunk_01_hook
          path: out/chunk_01_hook.mp4
          if-no-files-found: error

  render_chunk_02:
    name: "Stage 2b — Render chunk_02_setup"
    runs-on: ubuntu-latest
    needs: [render_chunk_01]
    steps:
