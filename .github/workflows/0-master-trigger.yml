name: "0 — MASTER TRIGGER (Full Pipeline)"

on:
  workflow_dispatch:
    inputs:
      skip_audio:
        description: "Skip audio generation (use existing artifacts)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  # ══════════════════════════════════════════════════════════════
  # STAGE 0 — Code Review & Typecheck
  # ══════════════════════════════════════════════════════════════
  review:
    name: "Stage 0 — Code Review & Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck

  audio:
    name: "Stage 1 — Generate Audio"
    runs-on: ubuntu-latest
    needs: [review]
    if: ${{ inputs.skip_audio != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg espeak-ng
      - name: Install Python dependencies
        run: pip install kokoro-onnx soundfile pydub --quiet
      - name: Create output directory
        run: mkdir -p public/audio/
      - name: Generate TTS
        run: python scripts/generate_audio.py || echo "Audio generation script not found or failed"
      - name: Upload Audio Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audio-assets
          path: public/audio/
          if-no-files-found: warn

  bundle:
    name: "Stage 2a — Bundle Project"
    runs-on: ubuntu-latest
    needs: [review]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Create output directory
        run: mkdir -p out
      - name: Debug - Check TypeScript files
        run: |
          echo "Checking for src/index.ts..."
          ls -la src/ || echo "src/ directory not found"
          find . -name "*.ts" -o -name "*.tsx" | head -20
      - name: Bundle Project
        run: |
          npx remotion bundle src/index.ts out/bundle.js --quiet
      - name: Debug - Check bundle output
        run: |
          echo "Checking bundle output..."
          ls -lh out/ || echo "out/ directory is empty"
          if [ -f "out/bundle.js" ]; then
            echo "✓ Bundle created successfully"
            wc -l out/bundle.js
          else
            echo "✗ Bundle file not found"
            exit 1
          fi
      - name: Upload Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: remotion-bundle
          path: out/bundle.js
          if-no-files-found: error

  render:
    name: "Stage 2b — Render ${{ matrix.chunk.id }}"
    runs-on: ubuntu-latest
    needs: [bundle]
    if: needs.bundle.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        chunk:
          - { id: 'chunk_01_hook', from: 0, duration: 220 }
          - { id: 'chunk_02_setup', from: 180, duration: 360 }
          - { id: 'chunk_03_mechanism', from: 500, duration: 740 }
          - { id: 'chunk_04_proof', from: 1200, duration: 600 }
          - { id: 'chunk_05_twist', from: 1760, duration: 600 }
          - { id: 'chunk_06_outro', from: 2320, duration: 380 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Create output directory
        run: mkdir -p out
      - name: Download Bundle
        uses: actions/download-artifact@v4
        with:
          name: remotion-bundle
          path: out/
      - name: Debug - Verify bundle exists
        run: |
          echo "Verifying bundle..."
          ls -lh out/
          if [ ! -f "out/bundle.js" ]; then
            echo "Error: bundle.js not found"
            exit 1
          fi
      - name: Download Audio (if available)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: audio-assets
          path: public/audio/
      - name: Render Chunk
        run: |
          npx remotion render out/bundle.js "${{ matrix.chunk.id }}" "out/${{ matrix.chunk.id }}.mp4" \
            --props '{}' \
            --concurrency 2 \
            --quiet
      - name: Verify render output
        run: |
          if [ -f "out/${{ matrix.chunk.id }}.mp4" ]; then
            echo "✓ Chunk rendered: ${{ matrix.chunk.id }}"
            ls -lh "out/${{ matrix.chunk.id }}.mp4"
          else
            echo "✗ Chunk render failed: ${{ matrix.chunk.id }}"
            exit 1
          fi
      - name: Upload Chunk Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.chunk.id }}
          path: out/${{ matrix.chunk.id }}.mp4
          if-no-files-found: error

  assemble:
    name: "Stage 3 — Assemble Final Video"
    runs-on: ubuntu-latest
    needs: [render, audio]
    if: needs.render.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
      - name: Create output directory
        run: mkdir -p out
      - name: Download Chunks
        uses: actions/download-artifact@v4
        with:
          pattern: chunk_*
          path: out/
          merge-multiple: true
      - name: Download Audio (if available)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: audio-assets
          path: public/audio/
      - name: Debug - List downloaded files
        run: |
          echo "Downloaded chunks:"
          ls -lh out/*.mp4 || echo "No MP4 files found"
          echo "Audio files:"
          ls -lh public/audio/ || echo "No audio files found"
      - name: Install Python dependencies
        run: pip install pydub --quiet
      - name: Assemble Final Video
        run: |
          if [ -f "scripts/assemble_video.py" ]; then
            python scripts/assemble_video.py
          else
            echo "Warning: assemble_video.py not found, using fallback concatenation"
            # Basic fallback: concatenate chunks using ffmpeg
            ls out/chunk_*.mp4 | sort | while read f; do echo "file '$f'"; done > concat.txt
            ffmpeg -f concat -safe 0 -i concat.txt -c copy out/BoneConduction_FINAL.mp4
          fi
      - name: Verify final video
        run: |
          if [ -f "out/BoneConduction_FINAL.mp4" ]; then
            echo "✓ Final video created"
            ls -lh out/BoneConduction_FINAL.mp4
          else
            echo "✗ Final video creation failed"
            exit 1
          fi
      - name: Upload Final Video
        uses: actions/upload-artifact@v4
        with:
          name: BoneConduction-FINAL
          path: out/BoneConduction_FINAL.mp4
          if-no-files-found: error
