            --concurrency 2 \
            --quiet
      - name: Verify render output
        run: |
          if [ -f "out/chunk_02_setup.mp4" ]; then
            echo "✓ chunk_02_setup rendered"
            ls -lh "out/chunk_02_setup.mp4"
          else
            echo "✗ chunk_02_setup render failed"
            exit 1
          fi
      - name: Upload Chunk Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chunk_02_setup
          path: out/chunk_02_setup.mp4
          if-no-files-found: error

  render_chunk_03:
    name: "Stage 2b — Render chunk_03_mechanism"
    runs-on: ubuntu-latest
    needs: [render_chunk_02]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
