name: "0 — MASTER TRIGGER (Full Pipeline)"

on:
  workflow_dispatch:

jobs:
  review:
    name: "Stage 0 — Code Review & Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Typecheck
        run: npm run typecheck

  audio:
    name: "Stage 1 — Generate Audio"
    runs-on: ubuntu-latest
    needs: [review]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg espeak-ng
      - name: Install Python dependencies
        run: pip install kokoro-onnx soundfile pydub --quiet
      - name: Create output directory
        run: mkdir -p public/audio/
      - name: Generate TTS
        run: python scripts/generate_audio.py
      - name: Verify audio files created
        run: |
          echo "Audio files generated:"
          ls -lh public/audio/ || echo "No audio files found"
      - name: Upload Audio Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audio-assets
          path: public/audio/
          if-no-files-found: error

  bundle:
    name: "Stage 2a — Bundle Project"
    runs-on: ubuntu-latest
    needs: [review]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Bundle Project
        run: |
          npx remotion bundle src/index.ts out/bundle.js --quiet || true
          if [ -f "build/bundle.js" ]; then
            mkdir -p out
            cp build/bundle.js out/bundle.js
          fi
      - name: Verify bundle
        run: |
          ls -la out/ || echo "out dir empty"
          ls -la build/ 2>/dev/null || echo "no build dir"
          if [ ! -f "out/bundle.js" ]; then
            echo "✗ Bundle file not found - trying cache location"
            npx remotion cache dir 2>/dev/null || true
          fi
          if [ -f "out/bundle.js" ]; then
            echo "✓ Bundle created successfully"
          else
            echo "✗ Bundle file not found"
            exit 1
          fi
      - name: Upload Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: remotion-bundle
          path: out/bundle.js
          if-no-files-found: error

  render:
    name: "Stage 2b — Render ${{ matrix.chunk.id }}"
    runs-on: ubuntu-latest
    needs: [bundle, audio]
    strategy:
      fail-fast: false
      matrix:
        chunk:
          - { id: "chunk_01_hook",      compositionId: "chunk_01_hook" }
          - { id: "chunk_02_setup",     compositionId: "chunk_02_setup" }
          - { id: "chunk_03_mechanism", compositionId: "chunk_03_mechanism" }
          - { id: "chunk_04_proof",     compositionId: "chunk_04_proof" }
          - { id: "chunk_05_twist",     compositionId: "chunk_05_twist" }
          - { id: "chunk_06_outro",     compositionId: "chunk_06_outro" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: Download Bundle
        uses: actions/download-artifact@v4
        with:
          name: remotion-bundle
          path: out/
      - name: Download Audio
        uses: actions/download-artifact@v4
        with:
          name: audio-assets
          path: public/audio/
      - name: Install Chrome for Remotion
        run: npx remotion browser ensure
      - name: Render chunk
        run: |
          npx remotion render \
            out/bundle.js "${{ matrix.chunk.compositionId }}" "out/${{ matrix.chunk.id }}.mp4" \
            --props '{}' \
            --concurrency 2 \
            --quiet
      - name: Verify render output
        run: |
          if [ -f "out/${{ matrix.chunk.id }}.mp4" ]; then
            echo "✓ ${{ matrix.chunk.id }} rendered"
            ls -lh "out/${{ matrix.chunk.id }}.mp4"
          else
            echo "✗ ${{ matrix.chunk.id }} render failed"
            exit 1
          fi
      - name: Upload Chunk Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.chunk.id }}
          path: out/${{ matrix.chunk.id }}.mp4
          if-no-files-found: error

  assemble:
    name: "Stage 3 — Assemble Final Video"
    runs-on: ubuntu-latest
    needs: [render, audio]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
      - name: Create output directory
        run: mkdir -p out
      - name: Download All Chunks
        uses: actions/download-artifact@v4
        with:
          pattern: "chunk_*"
          path: out/
          merge-multiple: true
      - name: Download Audio
        uses: actions/download-artifact@v4
        with:
          name: audio-assets
          path: public/audio/
      - name: Debug - List downloaded files
        run: |
          echo "Downloaded chunks:"
          ls -lh out/*.mp4 || echo "No MP4 files found"
          echo "Audio files:"
          ls -lh public/audio/ || echo "No audio files found"
      - name: Install Python dependencies
        run: pip install pydub --quiet
      - name: Assemble Final Video
        run: |
          if [ -f "scripts/assemble_video.py" ]; then
            python scripts/assemble_video.py
          else
            echo "Warning: assemble_video.py not found, using fallback concatenation"
            ls out/chunk_*.mp4 | sort | while read f; do echo "file '$f'"; done > concat.txt
            ffmpeg -f concat -safe 0 -i concat.txt -c copy out/BoneConduction_FINAL.mp4
          fi
      - name: Verify final video
        run: |
          if [ -f "out/BoneConduction_FINAL.mp4" ]; then
            echo "✓ Final video created"
            ls -lh out/BoneConduction_FINAL.mp4
          else
            echo "✗ Final video creation failed"
            exit 1
          fi
      - name: Upload Final Video
        uses: actions/upload-artifact@v4
        with:
          name: BoneConduction-FINAL
          path: out/BoneConduction_FINAL.mp4
          if-no-files-found: error