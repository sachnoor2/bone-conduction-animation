name: "0 — MASTER TRIGGER (Full Pipeline + YouTube Upload)"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      skip_audio:
        description: "Skip audio generation (use existing artifacts)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      upload_to_youtube:
        description: "Upload final video to YouTube"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  review:
    name: "Stage 0 — Code Review & Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies (with retry)
        run: |
          set -e
          attempts=3
          for i in $(seq 1 $attempts); do
            npm install --prefer-offline --no-audit && break || true
            echo "npm install failed (attempt $i)"
            if [ "$i" -lt "$attempts" ]; then sleep $((i * 5)); fi
          done
          if [ ! -d "node_modules" ]; then echo "npm install ultimately failed"; exit 1; fi
      - name: Typecheck
        run: npm run typecheck

  audio:
    name: "Stage 1 — Generate Audio"
    runs-on: ubuntu-latest
    needs: [review]
    if: ${{ inputs.skip_audio != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg espeak-ng
      - name: Install Python deps
        run: pip install kokoro-onnx soundfile pydub --quiet
      - name: Generate TTS
        run: python scripts/generate_audio.py
      - name: Upload Audio
        uses: actions/upload-artifact@v4
        with:
          name: audio-assets
          path: public/audio/
          if-no-files-found: warn

  bundle:
    name: "Stage 2a — Bundle Project"
    runs-on: ubuntu-latest
    needs: [review]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies (with retry)
        run: |
          set -e
          attempts=3
          for i in $(seq 1 $attempts); do
            npm install --prefer-offline --no-audit && break || true
            echo "npm install failed (attempt $i)"
            if [ "$i" -lt "$attempts" ]; then sleep $((i * 5)); fi
          done
          if [ ! -d "node_modules" ]; then echo "npm install ultimately failed"; exit 1; fi
      - name: Create output directory
        run: mkdir -p out/bundle
      - name: Create Bundle
        run: npx remotion bundle src/index.ts --out-dir out/bundle
      - name: List bundle output
        run: ls -la out/bundle/
      - name: Upload Bundle
        uses: actions/upload-artifact@v4
        with:
          name: remotion-bundle
          path: out/bundle/
          if-no-files-found: error

  render:
    name: "Stage 2b — Render ${{ matrix.chunk.id }}"
    runs-on: ubuntu-latest
    needs: [bundle]
    if: needs.bundle.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        chunk:
          - { id: 'chunk_01_hook', from: 0, duration: 220 }
          - { id: 'chunk_02_setup', from: 180, duration: 360 }
          - { id: 'chunk_03_mechanism', from: 500, duration: 740 }
          - { id: 'chunk_04_proof', from: 1200, duration: 600 }
          - { id: 'chunk_05_twist', from: 1760, duration: 600 }
          - { id: 'chunk_06_outro', from: 2320, duration: 380 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies (with retry)
        run: |
          set -e
          attempts=3
          for i in $(seq 1 $attempts); do
            npm install --prefer-offline --no-audit && break || true
            echo "npm install failed (attempt $i)"
            if [ "$i" -lt "$attempts" ]; then sleep $((i * 5)); fi
          done
          if [ ! -d "node_modules" ]; then echo "npm install ultimately failed"; exit 1; fi
      - name: Create output directory
        run: mkdir -p out/bundle
      - name: Download Bundle
        uses: actions/download-artifact@v4
        with:
          name: remotion-bundle
          path: out/bundle/
      - name: List downloaded bundle
        run: ls -la out/bundle/
      - name: Download audio
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: audio-assets
          path: public/audio/
      - name: Render Chunk
        run: npx remotion render out/bundle ${{ matrix.chunk.id }} out/${{ matrix.chunk.id }}.mp4 --props '{}'
      - name: Upload Chunk
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.chunk.id }}
          path: out/${{ matrix.chunk.id }}.mp4
          if-no-files-found: error

  assemble:
    name: "Stage 3 — Assemble Final Video"
    runs-on: ubuntu-latest
    needs: [render, audio]
    if: needs.render.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
      - name: Create output directory
        run: mkdir -p out
      - name: Download Chunks
        uses: actions/download-artifact@v4
        with:
          pattern: chunk_*
          path: out/
          merge-multiple: true
      - name: List downloaded chunks
        run: ls -la out/
      - name: Download audio
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: audio-assets
          path: public/audio/
      - name: Install Python deps
        run: pip install pydub --quiet
      - name: Assemble final video
        run: python scripts/assemble_video.py
      - name: Upload final video
        uses: actions/upload-artifact@v4
        with:
          name: BoneConduction-FINAL
          path: out/BoneConduction_FINAL.mp4
          if-no-files-found: error

  youtube:
    name: "Stage 4 — Upload to YouTube"
    runs-on: ubuntu-latest
    needs: [assemble]
    if: needs.assemble.result == 'success' && inputs.upload_to_youtube == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Create output directory
        run: mkdir -p out
      - name: Install Python deps
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests --quiet
      - name: Download final video
        uses: actions/download-artifact@v4
        with:
          name: BoneConduction-FINAL
          path: out/
      - name: Upload to YouTube
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python scripts/youtube_upload.py
