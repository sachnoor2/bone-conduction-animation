name: "0 — MASTER TRIGGER (Unified Pipeline)"

on:
  workflow_dispatch:

jobs:
  production:
    name: "Full Video Production"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install System Deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg espeak-ng

      - name: Install Python Deps
        run: pip install pydub kokoro-onnx soundfile --quiet

      - name: Install Node Deps
        run: npm ci --prefer-offline --no-audit

      - name: Download Kokoro Model
        run: |
          BASE="https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0"
          curl -L "$BASE/kokoro-v1.0.onnx" -o /tmp/kokoro-v1.0.onnx
          curl -L "$BASE/voices-v1.0.bin"  -o /tmp/voices-v1.0.bin

      - name: Generate Audio
        run: python scripts/generate_audio_kokoro.py

      - name: Bundle Project
        run: npx remotion bundle src/index.ts --output=out/bundle.js

      - name: Install Chrome
        run: npx remotion browser ensure

      - name: Render Video Chunks
        run: |
          mkdir -p out/chunks
          npx remotion render out/bundle.js chunk_01_hook out/chunks/chunk_01_hook.mp4 --codec=h264 --crf=18
          npx remotion render out/bundle.js chunk_02_setup out/chunks/chunk_02_setup.mp4 --codec=h264 --crf=18
          npx remotion render out/bundle.js chunk_03_mechanism out/chunks/chunk_03_mechanism.mp4 --codec=h264 --crf=18
          npx remotion render out/bundle.js chunk_04_proof out/chunks/chunk_04_proof.mp4 --codec=h264 --crf=18
          npx remotion render out/bundle.js chunk_05_twist out/chunks/chunk_05_twist.mp4 --codec=h264 --crf=18
          npx remotion render out/bundle.js chunk_06_outro out/chunks/chunk_06_outro.mp4 --codec=h264 --crf=18
        env:
          REMOTION_ALLOW_EVAL: true

      - name: Assemble Final Video
        run: |
          mv out/chunks/*.mp4 out/
          python scripts/assemble_video.py

      - name: Upload Final Video
        uses: actions/upload-artifact@v4
        with:
          name: LizardTail-FINAL
          path: out/BoneConduction_FINAL.mp4
          if-no-files-found: error
